<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/normalize.css" />
    <title> السيارات</title>
  </head>
  <body style="background-color: #eee;">
    <div id="updateForm" class="d-flex flex-column w-75 m-auto shadow p-3 mt-5 d-none">
      <h1 class="text-center"> تعديل البيانات</h1>

      <label for="IDD" class="fw-bold"> الرقم التعريفي:</label>
      <input type="num" id="IDD" name="Id" class="form-control mb-2" >
      <label for="name" class="fw-bold"> اسم السيارة :</label>
      <input type="text" id="name" name="name" class="form-control mb-2">
      <label for="capacity" class="fw-bold">السعة  :</label>
      <input type="text" id="capacity" name="capacity" class="form-control mb-2">
      <label for="description" class="fw-bold">الوصف :</label>
      <input type="text" id="description" name="description" class="form-control mb-2">
      <label for="addresses" class="fw-bold"> العنوان:</label>
      <input type="text" id="addresses" name="addresses" class="form-control mb-2">
      <label for="prices" class="fw-bold">السعر:</label>
      <input type="number" id="prices" name="prices" class="form-control mb-2">
      <label for="carImage" class="fw-bold">ادخل صورة العربية:</label>
      <input type="file" id="carImage" name="carImage" multiple class="mb-2">
    
      <button type="submit" class="btn btn-info fw-bold" onclick="updateCar(event)">حفظ التعديلات</button>
    </div>
    <div class="mt-5 w-75 m-auto">
      <table class="table text-center table-hover p-5">
        <thead >
          <tr class="table-active">
            <th>الرقم التعريفي</th>
            <th>اسم السيارة</th>
            <th>السعة</th>
            <th>الوصف</th>
            <th>العنوان</th>
            <th>السعر</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="data"></tbody>
      </table>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/carList.js"></script>
  </body>
</html>
